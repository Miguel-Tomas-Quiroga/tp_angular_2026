<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      
      <div class="slide-personalizado shadow-lg">
        
        <img [src]="eventos[indice].img" [alt]="eventos[indice].nombre" class="img-main">

        <div class="overlay d-flex flex-column justify-content-center align-items-center text-center text-white p-4">
          <h2 class="display-4 fw-bold">{{ eventos[indice].nombre }}</h2>
          <p class="lead w-75">{{ eventos[indice].descripcion }}</p>
        </div>

        <button class="btn-nav btn-left" (click)="anterior()">
          <i class="bi bi-chevron-left"></i>
        </button>
        
        <button class="btn-nav btn-right" (click)="siguiente()">
          <i class="bi bi-chevron-right"></i>
        </button>

      </div>

    </div>
  </div>
</div>
