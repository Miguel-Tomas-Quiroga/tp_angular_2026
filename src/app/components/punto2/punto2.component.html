<div class="container mt-4">
  <h2 class="text-center mb-4"> Productos Destacados</h2>
  
  <div class="text-end mb-3">
    <button class="btn btn-outline-dark" (click)="abrirModal()">
      🛒 <span class="badge bg-danger">{{ Arraycarrito.length }}</span>
    </button>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let p of productos">
      <div class="card h-100 border-0 shadow-sm">
        <img [src]="p.img" class="card-img-top p-3" [alt]="p.nombre" style="height: 200px; object-fit: contain;">
        <div class="card-body">
          <h6 class="card-title">{{ p.nombre }}</h6>
          <p class="card-text">{{ p.descripcion }}</p>
          <p class="text-success fw-bold">£{{ p.precio }}</p>
          <button class="btn btn-warning w-100 btn-sm" (click)="agregarAlCarrito(p)">Agregar al carrito</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalCarrito" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0">
        <div class="modal-body p-4">
          
          <div *ngIf="Arraycarrito.length === 0" class="text-center">El carrito está vacío</div>

          <div *ngFor="let item of Arraycarrito; let i = index" class="d-flex align-items-center border-bottom py-3">
            <div class="border p-2 me-3" style="width: 80px; height: 60px;">
              <img [src]="item.producto.img" class="img-fluid" style="max-height: 100%;">
            </div>
            
            <div class="flex-grow-1">
              <div class="fw-normal small">{{ item.producto.nombre }}</div>
              <div class="fw-bold">£{{ item.producto.precio }}</div>
            </div>

            <div class="d-flex align-items-center border rounded">
              <button class="btn btn-light btn-sm border-end" (click)="decrementar(item, i)">—</button>
              <div class="px-3 fw-bold">{{ item.cantidad }}</div>
              <button class="btn btn-light btn-sm border-start" (click)="incrementar(item)">+</button>
            </div>
          </div>

          <div *ngIf="Arraycarrito.length > 0" class="mt-3 text-end">
            <span class="text-muted me-2">Total:</span>
            <span class="fw-bold fs-5">£{{ calcularTotal() }}</span>
          </div>

          <div class="d-grid gap-2 mt-4">
            <button class="btn btn-success py-2 fw-bold text-uppercase" 
                    (click)="checkOut()" 
                    [disabled]="Arraycarrito.length === 0">
              Check Out 💳
            </button>
          </div>
          
        </div>
      </div>
    </div>
  </div>
</div>
