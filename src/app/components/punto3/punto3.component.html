<div class="container mt-5 mb-5 text-center">
  <h1 class="display-4 fw-bold text-primary mb-4">MEMORY</h1>

  <div class="row mb-4">
    <div class="col">
      <div class="alert alert-info d-inline-block px-5 shadow-sm">
        <h4 class="mb-0">Intentos Restantes: <strong>{{ intentosRestantes }}</strong></h4>
      </div>
      <p class="mt-2 fw-bold text-secondary">{{ mensaje }}</p>
    </div>
  </div>

  <div class="row justify-content-center mx-auto" style="max-width: 600px;">
    @for (carta of tablero; track carta.id) {
      <div class="col-3 mb-3">
        <div class="card-memory" 
             [class.flipped]="carta.volteada || carta.encontrada"
             (click)="seleccionarCarta(carta)">
          
          <div class="card-inner shadow">
            <div class="card-front bg-primary d-flex align-items-center justify-content-center text-white">
              <i class="bi bi-question-lg display-4"></i>
            </div>
            <div class="card-back bg-light d-flex align-items-center justify-content-center text-primary border border-primary">
              <i class="bi {{ carta.imagen }} display-4"></i>
            </div>
          </div>

        </div>
      </div>
    }
  </div>

  <div class="mt-4 gap-3 d-flex justify-content-center">
    <button class="btn btn-success btn-lg px-4" (click)="iniciarJuego()" [disabled]="juegoIniciado">INICIAR</button>
    <button class="btn btn-danger btn-lg px-4" (click)="reiniciar()">REINICIAR</button>
  </div>
</div>
